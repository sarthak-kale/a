<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXION — Sign In</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>
<div id="splash"><div class="splash-logo">AXION</div></div>
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-grid"></div>
  <div class="auth-box">
    <div class="auth-logo">AXION</div>
    <div class="auth-tagline">Your Productivity Command Center</div>

    <div class="auth-tabs-nav">
      <button class="auth-tab-btn active" data-tab="login">Sign In</button>
      <button class="auth-tab-btn" data-tab="register">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-tab active" id="tab-login">
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Sign in to continue your productivity streak</div>
      <div id="loginError" class="auth-error"></div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="password-toggle">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem">Sign In →</button>
      </form>
      <div class="auth-divider">or</div>
      <button id="demoLogin" class="btn btn-ghost" style="width:100%;justify-content:center">🎮 Try Demo Account</button>
    </div>

    <!-- REGISTER -->
    <div class="auth-tab" id="tab-register">
      <div class="auth-title">Create your account</div>
      <div class="auth-subtitle">Start your productivity journey today</div>
      <div id="registerError" class="auth-error"></div>
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="regName" class="form-input" placeholder="Alex Johnson" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" id="regPassword" class="form-input" placeholder="Min. 6 characters" autocomplete="new-password" required minlength="6">
            <button type="button" class="password-toggle">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem">Create Account →</button>
      </form>
    </div>

    <div class="auth-footer"><a href="index.html">← Back to home</a></div>
  </div>
</div>
<div id="toast-container"></div>
<script src="app.js"></script>
<script src="auth.js"></script>
<script>
// Check URL param to auto-switch to register tab
if (new URLSearchParams(window.location.search).get('tab') === 'register') {
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.auth-tab-btn')[1]?.click();
  });
}
</script>
</body>
</html>
