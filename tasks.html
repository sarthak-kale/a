<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks — AXION</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
<div class="app-layout" id="tasksPage">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="sidebar-logo">AXION</div><span class="sidebar-version">v1.0</span></div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">🏠</span>Dashboard</a></li>
        <li><a href="tasks.html" class="sidebar-link active"><span class="sidebar-icon">📋</span>Tasks</a></li>
        <li><a href="calendar.html" class="sidebar-link"><span class="sidebar-icon">📅</span>Calendar</a></li>
        <li><a href="pomodoro.html" class="sidebar-link"><span class="sidebar-icon">🍅</span>Pomodoro</a></li>
        <li><a href="analytics.html" class="sidebar-link"><span class="sidebar-icon">📊</span>Analytics</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <ul class="sidebar-nav">
        <li><a href="settings.html" class="sidebar-link"><span class="sidebar-icon">⚙️</span>Settings</a></li>
      </ul>
    </div>
    <div class="sidebar-footer">
      <a href="settings.html" class="user-card">
        <div class="user-avatar">U</div>
        <div><div class="user-name">Loading...</div><div class="user-plan">Free Plan</div></div>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div><div class="page-title">Tasks</div><div class="page-subtitle">Manage all your tasks</div></div>
      <div class="topbar-right">
        <button id="themeToggle" class="topbar-btn topbar-theme">☀️</button>
        <button id="addTaskBtn" class="btn btn-primary btn-sm">+ Add Task</button>
        <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem">
      <div class="stat-card"><div class="stat-card-icon">📋</div><div class="stat-card-value" id="statTotal">0</div><div class="stat-card-label">Total</div></div>
      <div class="stat-card"><div class="stat-card-icon">⏳</div><div class="stat-card-value" id="statPending">0</div><div class="stat-card-label">Pending</div></div>
      <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value" id="statDone">0</div><div class="stat-card-label">Done</div></div>
      <div class="stat-card"><div class="stat-card-icon">⚠️</div><div class="stat-card-value" id="statOverdue">0</div><div class="stat-card-label">Overdue</div></div>
    </div>

    <!-- Filters + Search -->
    <div class="card" style="margin-bottom:1.5rem">
      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center">
        <input type="text" id="taskSearch" class="form-input" placeholder="🔍 Search tasks..." style="max-width:280px;flex:1">
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm active" data-filter="all" style="transition:all 0.2s">All</button>
          <button class="btn btn-ghost btn-sm" data-filter="pending">Pending</button>
          <button class="btn btn-ghost btn-sm" data-filter="done">Done</button>
          <button class="btn btn-ghost btn-sm" data-filter="overdue">Overdue</button>
          <button class="btn btn-ghost btn-sm" data-filter="high">🔴 High</button>
          <button class="btn btn-ghost btn-sm" data-filter="medium">🟡 Medium</button>
          <button class="btn btn-ghost btn-sm" data-filter="low">🟢 Low</button>
        </div>
      </div>
    </div>

    <!-- Task List -->
    <div class="card">
      <div id="fullTasksList"></div>
    </div>
  </main>
</div>

<!-- TASK MODAL -->
<div id="taskModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="taskModalTitle">+ New Task</div>
      <button class="modal-close" id="closeTaskModal">✕</button>
    </div>
    <form id="taskForm">
      <div class="form-group"><label class="form-label">Title *</label><input type="text" id="taskTitle" class="form-input" placeholder="What needs to be done?" required></div>
      <div class="form-group"><label class="form-label">Description</label><textarea id="taskDescription" class="form-textarea" placeholder="Add more details..."></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group"><label class="form-label">Priority</label>
          <select id="taskPriority" class="form-select">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Category</label>
          <select id="taskCategory" class="form-select">
            <option value="general">General</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="health">Health</option>
            <option value="learning">Learning</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Due Date</label><input type="date" id="taskDueDate" class="form-input"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Save Task</button>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/streak.js"></script>
<script src="js/notifications.js"></script>
<script src="js/tasks.js"></script>
</body>
</html>
